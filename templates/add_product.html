<!DOCTYPE html>
<html>

<head>
    <title>Add Product</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f7f6;
        }
        
        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            cursor: pointer;
        }
        
        a {
            text-decoration: none;
        }
    </style>

</head>

<body>

    <div class="container">
        <h2>Add Product</h2>

        <form method="POST">
            <input type="text" name="name" placeholder="Product Name" required>
            <input type="text" name="category" placeholder="Category" required>
            <input type="number" name="stock" placeholder="Stock Quantity" required>
            <input type="number" step="0.01" name="price" placeholder="Price" required>
            <button type="submit">
Save Product
</button>
        </form>

        <br>

        <a href="/dashboard">
← Back to Dashboard
</a>

    </div>

</body>

</html>
