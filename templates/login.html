<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Inventory & Sales Management</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }
        
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url("https://images.unsplash.com/photo-1604719312566-8912e9227c6a?q=80&w=1974&auto=format&fit=crop");
            background-size: cover;
            background-position: center;
        }
        
        .login-box {
            width: 420px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        .login-box h1 {
            text-align: center;
            margin-bottom: 35px;
            line-height: 1.4;
            font-size: 38px;
        }
        
        .input-group {
            margin-bottom: 25px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 18px;
        }
        
        .input-group input {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 16px;
        }
        
        .input-group input::placeholder {
            color: #ddd;
        }
        
        .login-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #14c6f3;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .login-btn:hover {
            background: #0ea5c6;
        }
    </style>

</head>

<body>

    <div class="login-box">

        <h1>
            INVENTORY & SALES MANAGEMENT
        </h1>

        <form method="POST">

            <div class="input-group">

                <label>Email Address</label>

                <input type="email" name="email" required>

            </div>

            <div class="input-group">

                <label>Password</label>

                <input type="password" name="password" required>

            </div>

            <button type="submit" class="login-btn">
                SIGN IN
            </button>

        </form>

    </div>

</body>

</html>
