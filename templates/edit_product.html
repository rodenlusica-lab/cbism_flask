<!DOCTYPE html>
<html>

<head>
    <title>Edit Product</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f7f6;
        }
        
        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>Edit Product</h2>

        <form method="POST">

            <input type="text" name="name" value="{{ product.Product_Name }}" required>

            <input type="text" name="category" value="{{ product.Category }}" required>

            <input type="number" name="stock" value="{{ product.Stock_Quantity }}" required>

            <input type="number" step="0.01" name="price" value="{{ product.Unit_Price }}" required>

            <button type="submit">
Update Product
</button>

        </form>

        <br>

        <a href="/dashboard">
← Back to Dashboard
</a>

    </div>

</body>

</html>
